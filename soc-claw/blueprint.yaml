# =============================================================================
# NemoClaw Blueprint — SOC-Claw (Track 5: Agentic Edge)
# Three-agent incident response pipeline: Triage -> Verifier -> Response.
# Only the Triage Agent has tools; Verifier and Response are pure-reasoning
# and are driven by pipeline.py with their own per-agent system prompts
# (see soc-claw/agents/*.py). NemoClaw enforces network/filesystem/steering.
# =============================================================================

apiVersion: nemoclaw/v1
kind: Blueprint
metadata:
  name: soc-claw
  description: "Three-agent SOC alert triage, verification, and response planning powered by vLLM-served Nemotron"

# --- Inference profiles ---
# Switch at runtime with: openshell inference set --provider <name>
# soc-claw's privacy router (utils.py) chooses local-vs-cloud per prompt;
# both routes terminate at one of these profiles.
inference:
  default_profile: vllm

  profiles:
    # --- Local vLLM on the host GPU (sensitive SOC data stays here) ---
    - name: vllm
      provider: openai-compatible
      endpoint: http://host.openshell.internal:8000/v1
      model: nvidia/Nemotron-Mini-4B-Instruct
      api_key_env: OPENAI_API_KEY    # defaults to "dummy" for local vLLM
      wire_api: chat_completions
      temperature: 0.2               # deterministic triage / verification
      max_tokens: 2048

    # --- NVIDIA cloud Nemotron (generic threat-intel queries only) ---
    - name: nvidia-cloud
      provider: nvidia
      endpoint: https://integrate.api.nvidia.com/v1
      model: nvidia/nemotron-3-super-120b
      api_key_env: NVIDIA_API_KEY

# --- Network policy ---
# Default-deny. Only what the agents and UI need is whitelisted.
# No EDR/firewall/ITSM hosts: the response_tools.py functions are simulated
# stdout-loggers, not real outbound calls.
network:
  allowed_hosts:
    - host.openshell.internal     # local vLLM and the Gradio/FastAPI UI
    - integrate.api.nvidia.com    # cloud Nemotron for non-sensitive prompts
  blocked_by_default: true

# --- Filesystem policy ---
filesystem:
  read_paths:
    - /sandbox
    - /workspace
    - /tmp
  write_paths:
    - /sandbox
    - /tmp
  readonly_paths:
    - /models

# --- Agent configuration ---
# soc-claw runs THREE agents from a single orchestrator (pipeline.py).
# Per-agent system prompts live in agents/triage_agent.py,
# agents/verifier_agent.py, and agents/response_agent.py — they are
# applied at runtime, so we omit a single system_prompt_file here.
# Tools listed below are the Triage Agent's only; Verifier and Response
# are reasoning-only by design (see PRD section 5).
agent:
  name: soc-claw-pipeline
  tools:
    - name: ip_reputation
      description: "Look up an IP against the threat-intel database"
      module: tools.ip_reputation
    - name: mitre_lookup
      description: "Map observed behavior to MITRE ATT&CK techniques"
      module: tools.mitre_lookup
    - name: asset_lookup
      description: "Retrieve asset criticality and ownership from the CMDB"
      module: tools.asset_lookup

# --- Steering rules ---
# Triage's JSON verdict, Verifier's checklist, and Response's action plan
# are all strict JSON schemas; enforce them at the model layer to fail fast
# on hallucinated fields.
steering:
  structured_output: true
  enforce_tool_schema: true
  max_tool_calls_per_turn: 5     # Triage: 3 base calls + retry headroom
  fail_on_schema_violation: true
