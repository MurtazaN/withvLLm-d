<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>SOC-Claw | Sign In</title>
<link rel="stylesheet" href="/static/tailwind.css"/>
</head>
<body class="bg-[#0e0e0e] min-h-screen flex items-center justify-center font-body antialiased">

<div class="w-full max-w-md mx-auto px-6 fade-in">
    <!-- Branding -->
    <div class="flex flex-col items-center mb-10">
        <div class="w-16 h-16 bg-red-600 flex items-center justify-center rounded-xl mb-5 shadow-lg shadow-red-600/20">
            <span class="material-symbols-outlined text-white text-[36px]" style="font-variation-settings:'FILL' 1">security</span>
        </div>
        <h1 class="text-red-600 font-display font-black text-3xl tracking-tight">SOC-Claw</h1>
        <p class="text-zinc-500 text-xs uppercase tracking-[0.25em] mt-2 font-semibold">Incident Response Platform</p>
    </div>

    <!-- Login Card -->
    <div class="bg-[#1a1a1a] border border-zinc-800 rounded-2xl p-8 shadow-2xl">
        <h2 class="text-white font-display text-lg font-bold mb-1">Sign in</h2>
        <p class="text-zinc-500 text-sm mb-6">Enter your analyst credentials to continue</p>

        {% if error %}
        <div class="bg-red-950/50 border border-red-800 text-red-400 text-sm px-4 py-3 rounded-lg mb-6 flex items-center gap-2">
            <span class="material-symbols-outlined text-[18px]">error</span>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label for="username" class="block text-[10px] uppercase tracking-wider font-bold text-zinc-500 mb-2">Username</label>
                <input
                    type="text"
                    id="username"
                    name="username"
                    required
                    autocomplete="username"
                    class="w-full bg-[#111] border border-zinc-700 text-white text-sm rounded-lg px-4 py-3 focus:ring-2 focus:ring-red-600 focus:border-red-600 placeholder-zinc-600 transition-all"
                    placeholder="analyst"
                />
            </div>
            <div>
                <label for="password" class="block text-[10px] uppercase tracking-wider font-bold text-zinc-500 mb-2">Password</label>
                <input
                    type="password"
                    id="password"
                    name="password"
                    required
                    autocomplete="current-password"
                    class="w-full bg-[#111] border border-zinc-700 text-white text-sm rounded-lg px-4 py-3 focus:ring-2 focus:ring-red-600 focus:border-red-600 placeholder-zinc-600 transition-all"
                    placeholder="••••••••"
                />
            </div>
            <button
                type="submit"
                class="w-full bg-red-600 text-white px-6 py-3 rounded-lg text-xs font-bold uppercase tracking-wider hover:bg-red-700 transition-all flex items-center justify-center gap-2 shadow-lg shadow-red-600/20"
            >
                <span class="material-symbols-outlined text-[18px]">login</span>
                Sign In
            </button>
        </form>
    </div>

    <p class="text-center text-zinc-700 text-[10px] uppercase tracking-widest mt-8">Authorized Personnel Only</p>
</div>

</body>
</html>
