# Blue Lantern — local & dev orchestration.
#
# vLLM runs on the host (see scripts/run-host-vllm.sh). The app reaches it
# via host.docker.internal:8000. On Linux, extra_hosts maps that name to
# the host gateway; on Mac/Windows Docker Desktop already resolves it.
#
# Usage:
#   docker compose up                                          # app on :7860
#   docker compose --profile benchmark run --rm benchmark 5    # 5-alert run

services:
  app:
    build: .
    image: blue-lantern:dev
    container_name: blue-lantern-app
    ports:
      # Loopback-only by default. External access via SSH tunnel
      # (`ssh -L 7860:localhost:7860 <host>`) so the network firewall
      # is the loopback interface itself, not just FastAPI Guard.
      - "127.0.0.1:7860:7860"
    env_file:
      - .env
    environment:
      BLUE_LANTERN_LOCAL_VLLM_URL: ${BLUE_LANTERN_LOCAL_VLLM_URL:-http://host.docker.internal:8000/v1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      BLUE_LANTERN_LOG_LEVEL: ${BLUE_LANTERN_LOG_LEVEL:-INFO}
      BLUE_LANTERN_LOG_FILE: ${BLUE_LANTERN_LOG_FILE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src/blue_lantern/benchmark/results:/app/src/blue_lantern/benchmark/results
      - ./.secrets/bluelantern-gcs.json:/app/.secrets/bluelantern-gcs.json:ro
    restart: unless-stopped

  benchmark:
    build: .
    image: blue-lantern:dev
    container_name: blue-lantern-benchmark
    profiles: ["benchmark"]
    env_file:
      - .env
    environment:
      BLUE_LANTERN_LOCAL_VLLM_URL: ${BLUE_LANTERN_LOCAL_VLLM_URL:-http://host.docker.internal:8000/v1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      BLUE_LANTERN_LOG_LEVEL: ${BLUE_LANTERN_LOG_LEVEL:-WARNING}
      BLUE_LANTERN_LOG_FILE: ${BLUE_LANTERN_LOG_FILE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./src/blue_lantern/benchmark/results:/app/src/blue_lantern/benchmark/results
      - ./.secrets/bluelantern-gcs.json:/app/.secrets/bluelantern-gcs.json:ro
    entrypoint: ["python", "-m", "blue_lantern.benchmark.harness"]
    command: ["30"]
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: blue-lantern-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: blue-lantern-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: blue-lantern-kafka
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # Two listeners: INTERNAL for compose-network clients (kafka-init, app),
      # EXTERNAL for host clients reaching the published port. Required because
      # the advertised address is what the broker hands back during the
      # post-handshake redirect, and it has to resolve from the client's POV.
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "kafka:29092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: blue-lantern-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC_ALERTS: blue-lantern-alerts
      KAFKA_TOPIC_DLQ: blue-lantern-alerts-dlq
      KAFKA_PARTITIONS: 3
      KAFKA_REPLICATION_FACTOR: 1
    command: |
      bash -c "
      echo 'Waiting for Kafka to be ready...'
      until kafka-topics --bootstrap-server kafka:29092 --list > /dev/null 2>&1; do
        echo 'Kafka not ready yet, waiting...'
        sleep 5
      done
      echo 'Kafka is ready! Creating topics...'
      kafka-topics --create --bootstrap-server kafka:29092 --topic blue-lantern-alerts --partitions 3 --replication-factor 1 --if-not-exists
      kafka-topics --create --bootstrap-server kafka:29092 --topic blue-lantern-alerts-dlq --partitions 1 --replication-factor 1 --if-not-exists
      echo 'Topics created successfully!'
      kafka-topics --bootstrap-server kafka:29092 --list
      "
    restart: "no"
