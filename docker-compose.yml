# SOC-Claw — local & dev orchestration.
#
# vLLM runs on the host (see scripts/run-host-vllm.sh). The app reaches it
# via host.docker.internal:8000. On Linux, extra_hosts maps that name to
# the host gateway; on Mac/Windows Docker Desktop already resolves it.
#
# Usage:
#   docker compose up                                          # app on :7860
#   docker compose --profile benchmark run --rm benchmark 5    # 5-alert run

services:
  app:
    build: .
    image: soc-claw:dev
    container_name: soc-claw-app
    ports:
      # Loopback-only by default. External access via SSH tunnel
      # (`ssh -L 7860:localhost:7860 <host>`) so the network firewall
      # is the loopback interface itself, not just FastAPI Guard.
      - "127.0.0.1:7860:7860"
    env_file:
      - .env
    environment:
      SOC_CLAW_LOCAL_VLLM_URL: ${SOC_CLAW_LOCAL_VLLM_URL:-http://host.docker.internal:8000/v1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      SOC_CLAW_LOG_LEVEL: ${SOC_CLAW_LOG_LEVEL:-INFO}
      SOC_CLAW_LOG_FILE: ${SOC_CLAW_LOG_FILE:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-local}
      PINECONE_HOST: ${PINECONE_HOST:-http://pinecone:5080}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-soc-claw-playbooks}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./soc_claw/benchmark/results:/app/soc_claw/benchmark/results
    restart: unless-stopped

  benchmark:
    build: .
    image: soc-claw:dev
    container_name: soc-claw-benchmark
    profiles: ["benchmark"]
    env_file:
      - .env
    environment:
      SOC_CLAW_LOCAL_VLLM_URL: ${SOC_CLAW_LOCAL_VLLM_URL:-http://host.docker.internal:8000/v1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      SOC_CLAW_LOG_LEVEL: ${SOC_CLAW_LOG_LEVEL:-WARNING}
      SOC_CLAW_LOG_FILE: ${SOC_CLAW_LOG_FILE:-}
      PINECONE_API_KEY: ${PINECONE_API_KEY:-local}
      PINECONE_HOST: ${PINECONE_HOST:-http://pinecone:5080}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-soc-claw-playbooks}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./soc_claw/benchmark/results:/app/soc_claw/benchmark/results
    entrypoint: ["python", "-m", "soc_claw.benchmark.harness"]
    command: ["30"]
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: soc-claw-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  pinecone:
    image: ghcr.io/pinecone-io/pinecone-local:latest
    container_name: soc-claw-pinecone
    environment:
      PORT: 5080
      # Hostname baked into per-index URLs returned by describe_index.
      # Must (a) be reachable from sibling containers and (b) contain a `.`
      # to satisfy the v6 client's check_realistic_host validator.
      PINECONE_HOST: pinecone.local
      PINECONE_API_KEY: ${PINECONE_API_KEY:-local}
    networks:
      default:
        aliases:
          - pinecone.local
    ports:
      - "5080-5090:5080-5090"
    platform: linux/amd64
    restart: unless-stopped

  rag-seed:
    build: .
    image: soc-claw:dev
    container_name: soc-claw-rag-seed
    env_file:
      - .env
    environment:
      PINECONE_API_KEY: ${PINECONE_API_KEY:-local}
      PINECONE_HOST: ${PINECONE_HOST:-http://pinecone:5080}
      PINECONE_INDEX_NAME: ${PINECONE_INDEX_NAME:-soc-claw-playbooks}
    depends_on:
      - pinecone
    entrypoint: ["python", "-m", "soc_claw.rag.index", "--wait"]
    restart: "no"
