# SOC-Claw — local & dev orchestration.
#
# vLLM runs on the host (see scripts/run-host-vllm.sh). The app reaches it
# via host.docker.internal:8000. On Linux, extra_hosts maps that name to
# the host gateway; on Mac/Windows Docker Desktop already resolves it.
#
# Usage:
#   docker compose up                                          # app on :7860
#   docker compose --profile benchmark run --rm benchmark 5    # 5-alert run

services:
  app:
    build: .
    image: soc-claw:dev
    container_name: soc-claw-app
    ports:
      # Loopback-only by default. External access via SSH tunnel
      # (`ssh -L 7860:localhost:7860 <host>`) so the network firewall
      # is the loopback interface itself, not just FastAPI Guard.
      - "127.0.0.1:7860:7860"
    env_file:
      - .env
    environment:
      SOC_CLAW_LOCAL_VLLM_URL: ${SOC_CLAW_LOCAL_VLLM_URL:-http://host.docker.internal:8000/v1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      SOC_CLAW_LOG_LEVEL: ${SOC_CLAW_LOG_LEVEL:-INFO}
      SOC_CLAW_LOG_FILE: ${SOC_CLAW_LOG_FILE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./soc_claw/benchmark/results:/app/soc_claw/benchmark/results
      - ./secrets/bluelantern-gcs.json:/app/secrets/bluelantern-gcs.json:ro
    restart: unless-stopped

  benchmark:
    build: .
    image: soc-claw:dev
    container_name: soc-claw-benchmark
    profiles: ["benchmark"]
    env_file:
      - .env
    environment:
      SOC_CLAW_LOCAL_VLLM_URL: ${SOC_CLAW_LOCAL_VLLM_URL:-http://host.docker.internal:8000/v1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      SOC_CLAW_LOG_LEVEL: ${SOC_CLAW_LOG_LEVEL:-WARNING}
      SOC_CLAW_LOG_FILE: ${SOC_CLAW_LOG_FILE:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./soc_claw/benchmark/results:/app/soc_claw/benchmark/results
    entrypoint: ["python", "-m", "soc_claw.benchmark.harness"]
    command: ["30"]
    restart: "no"

  redis:
    image: redis:7-alpine
    container_name: soc-claw-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: soc-claw-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "127.0.0.1:2181:2181"
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: soc-claw-kafka
    depends_on:
      - zookeeper
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: soc-claw-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC_ALERTS: soc-claw-alerts
      KAFKA_TOPIC_DLQ: soc-claw-alerts-dlq
      KAFKA_PARTITIONS: 3
      KAFKA_REPLICATION_FACTOR: 1
    command: |
      bash -c "
      echo 'Waiting for Kafka to be ready...'
      until kafka-topics --bootstrap-server kafka:9092 --list > /dev/null 2>&1; do
        echo 'Kafka not ready yet, waiting...'
        sleep 5
      done
      echo 'Kafka is ready! Creating topics...'
      kafka-topics --create --bootstrap-server kafka:9092 --topic soc-claw-alerts --partitions 3 --replication-factor 1 --if-not-exists
      kafka-topics --create --bootstrap-server kafka:9092 --topic soc-claw-alerts-dlq --partitions 1 --replication-factor 1 --if-not-exists
      echo 'Topics created successfully!'
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    restart: "no"
